settings:
  site_title: Cosmology Brief
  site_description: Daily cosmology news and India-relevant cosmology academic opportunities.
  baseurl: /cosmology
  news_limit: 40
  jobs_limit: 70
  final_news_points: 5
  final_jobs_points: 5
  max_groups_per_section: 10
  min_group_score: 2
  require_ist_today: false
  max_age_hours_news: 168
  max_age_hours_jobs: 1440
  allow_unknown_dates_news: true
  allow_unknown_dates_jobs: true
  freshness_first: true
  show_fetch_warnings: false
  audience_region: India
  jobs_policy: 'Prefer positions realistically useful to an India-resident cosmology researcher:
    Indian postdoctoral/faculty/scientist opportunities first; international postdocs and fellowships
    that commonly accept overseas applicants next; citizenship-limited programmes should be avoided
    or treated as low-priority awareness links only.'
  news_keywords: cosmology,cosmic,universe,dark energy,dark matter,cosmic microwave background,CMB,
    Hubble tension,S8 tension,early universe,inflation,large-scale structure,galaxy survey, Euclid,DESI,LSST,Planck,Roman,Webb,gravitational
    waves,black holes,primordial, nucleosynthesis,redshift,supernova,lensing,cosmological constant,modified
    gravity, baryon acoustic oscillations,BAO
  job_keywords: cosmology,astrophysics,astronomy,astronomer,particle astrophysics,astroparticle,
    gravitation,gravity,relativity,dark matter,dark energy,CMB,large-scale structure, galaxy formation,postdoctoral,postdoc,research
    associate,research fellow,fellowship, research scientist,scientist,faculty,assistant professor,associate
    professor, tenure track,visiting fellow,academic position
  india_priority_keywords: India,Indian citizen,Indian citizens,India-resident,Indian researcher,Indian
    origin, IUCAA,TIFR,PRL,RRI,IIA,ARIES,NCRA,HRI,ICTS,SINP,ANRF,SERB,ASI,INSA
  exclude_keywords: horoscope,astrology,zodiac,celebrity,recipe,photos,photo gallery,viral video,
    wallpaper,quiz,advertorial,sponsored,newsletter signup,PhD studentship,graduate school, undergraduate,internship,school
    teacher
  fetch_timeout_seconds: 6
sources:
  news:
    research:
    - name: arXiv astro-ph.CO
      type: atom
      weight: 10
      url: https://export.arxiv.org/api/query?search_query=cat:astro-ph.CO&sortBy=submittedDate&sortOrder=descending&max_results=25
      note: Primary preprint feed for cosmology papers.
      home_url: https://arxiv.org/list/astro-ph.CO/recent
    - name: arXiv gr-qc Cosmology Search
      type: atom
      weight: 8
      url: https://export.arxiv.org/api/query?search_query=cat:gr-qc+AND+all:cosmology&sortBy=submittedDate&sortOrder=descending&max_results=15
      note: Useful for gravity, modified gravity, and early-universe theory.
      home_url: https://arxiv.org/list/gr-qc/recent
    agencies_and_observatories:
    - name: NASA News Releases
      type: rss
      weight: 8
      url: https://www.nasa.gov/news-release/feed/
      home_url: https://www.nasa.gov/news/
    - name: ESA Top News
      type: rss
      weight: 8
      url: https://www.esa.int/rssfeed/TopNews
      home_url: https://www.esa.int/Newsroom
    - name: NASA Universe
      type: portal
      weight: 7
      url: https://science.nasa.gov/universe/
      note: Portal retained; RSS/Atom sources are used for automated fetching.
    science_news:
    - name: ScienceDaily Space and Time
      type: rss
      weight: 7
      url: https://www.sciencedaily.com/rss/space_time.xml
      home_url: https://www.sciencedaily.com/news/space_time/
    - name: Phys.org Astronomy and Space
      type: rss
      weight: 7
      url: https://phys.org/rss-feed/space-news/astronomy/
      home_url: https://phys.org/space-news/astronomy/
    - name: MIT Astrophysics
      type: rss
      weight: 6
      url: https://news.mit.edu/rss/topic/astrophysics
      home_url: https://news.mit.edu/topic/astrophysics
    - name: Universe Today
      type: rss
      weight: 5
      url: https://www.universetoday.com/feed/
      home_url: https://www.universetoday.com/
    - name: Sky & Telescope News
      type: portal
      weight: 3
      url: https://skyandtelescope.org/astronomy-news/
      note: Portal only; RSS blocks automated fetches on some machines.
  jobs:
    india_priority:
    - name: ASI Job Register India
      type: portal
      weight: 13
      region: India
      eligibility: India-relevant astronomy and astrophysics opportunities.
      url: https://www.astron-soc.in/list-of-jobs
      note: Best single India-specific astronomy/astrophysics job register.
    - name: IUCAA Opportunities
      type: portal
      weight: 12
      region: India
      eligibility: Indian institute; postdoc, faculty, scientist, JRF/project opportunities.
      url: https://www.iucaa.in/en/opportunities
      note: Portal retained for India-relevant manual checking; not fetched automatically to avoid
        403/SSL/JavaScript failures.
    - name: IUCAA Faculty Openings
      type: portal
      weight: 11
      region: India
      eligibility: Faculty applications are typically for Indian citizens unless stated otherwise.
